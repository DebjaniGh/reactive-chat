<!-- src/app/features/chat/header/header.component.html -->
<header class="header">
  <div class="header__brand">
    <svg
      class="header__logo"
      width="28"
      height="28"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#c7d2fe"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <h1 class="header__title">ReactiveChat</h1>
  </div>

  <div class="header__user">
    <app-avatar
      [src]="currentUser.avatarUrl"
      [name]="currentUser.name"
      [status]="currentUser.status"
      size="sm"
    />
    <span class="header__username">{{ currentUser.name }}</span>
    <button class="header__logout" (click)="logoutClicked.emit()" title="Logout">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
